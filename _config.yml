# Site
title:              Hao Li
bio:                'Everyday is a new world.'
description:        "Don't walk behind me, I may not lead. Don't walk in front of me, I may not follow. Just walk beside me and be my friend."
reading_time:       true
words_per_minute:   200
logo:               'assets/img/Logo.jpeg'
background:         'assets/img/placeholder.jpeg'
tiled_bg:           false   # Set this true if you want to tile your background image, otherwise it will be covered
locale:             en_US
url:                https://haoli-70.github.io

# Jekyll
permalink:          /:title/
markdown:           kramdown
highlighter:        rouge
kramdown:
  auto_ids:         true
  footnote_nr:      1
  entity_output:    as_char
  toc_levels:       1..6
  enable_coderay:   false
mathjax:            true
sass:
  sass_dir:         _sass
  style:            compressed

